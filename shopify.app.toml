# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "ef8946bbeb92c6563387dfd1267bb3b3"
name = "LS AI Portrait POD Flow"
application_url = "https://gray-studio-inc-app.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-10"

  [[webhooks.subscriptions]]
  topics = [ "orders/paid" ]
  uri = "/webhooks/orders/paid"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# read_orders is protected customer data — Shopify surfaces the "Protected customer data
# access" approval card once this scope is declared and the app version is deployed.
scopes = "write_products,write_app_proxy,read_orders"

[auth]
redirect_urls = [
  "https://gray-studio-inc-app.vercel.app/auth/callback",
  "https://gray-studio-inc-app.vercel.app/auth/login/callback",
  "https://gray-studio-inc-app.vercel.app/api/auth/callback"
]

# Absolute URL including /apps/portrait: Shopify forwards the part of the storefront path
# after /apps/portrait — so /apps/portrait/generate hits this app at /apps/portrait/generate,
# matching the apps.portrait.* route files. (Relative URLs only work during `shopify app dev`.)
[app_proxy]
url = "https://gray-studio-inc-app.vercel.app/apps/portrait"
subpath = "portrait"
prefix = "apps"
